services:
  - type: web
    name: krilywete
    runtime: docker
    plan: free
    region: frankfurt
    branch: master
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: Krilywete
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: error
      - key: DB_CONNECTION
        value: sqlite
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: DEMO_MODE
        value: "true"
